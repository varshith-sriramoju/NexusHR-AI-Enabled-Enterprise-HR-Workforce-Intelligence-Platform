apiVersion: apps/v1

kind: Deployment

metadata:
  name: employee-service

spec:

  replicas: 2

  selector:
    matchLabels:
      app: employee

  template:

    metadata:
      labels:
        app: employee

    spec:

      containers:

        - name: employee

          image: varshith1001/employee-service:latest



          ports:
            - containerPort: 8082

          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: employee-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: employee-config
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: employee-config
                  key: DB_NAME

            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: employee-config
                  key: DB_USERNAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: employee-secret
                  key: DB_PASSWORD

            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: employee-config
                  key: REDIS_HOST

            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: employee-config
                  key: REDIS_PORT

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: employee-secret
                  key: JWT_SECRET