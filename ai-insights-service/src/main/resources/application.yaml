spring:
  application:
    name: ai-insights-service
  ai:
    openai:
      base-url: ${OPENAI_API_KEY}
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: llama-3.1-8b-instant
  data:
    redis:
      host: redis
      port: 6379
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/nexushr
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: true

server:
  port: 8084
