server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    out-of-order: true

  data:
    redis:
      host: redis
      port: 6379

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.flywaydb: DEBUG
