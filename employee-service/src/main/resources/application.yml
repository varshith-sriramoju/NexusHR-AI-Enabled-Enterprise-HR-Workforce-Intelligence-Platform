server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nexushr
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    out-of-order: true

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: yourVerySecretKey

logging:
  level:
    org.flywaydb: DEBUG
