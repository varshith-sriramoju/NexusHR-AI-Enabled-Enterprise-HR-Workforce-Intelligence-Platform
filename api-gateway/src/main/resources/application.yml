spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # AUTH SERVICE
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        # EMPLOYEE SERVICE
        - id: employee-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/employees/**,/api/dashboard/**,/api/attendance/**,/api/leaves/**,/api/performance/**

        # PAYROLL SERVICE
        - id: payroll-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/payroll/**

        # AI SERVICE
        - id: ai-insights-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/ai/**

server:
  port: 8080