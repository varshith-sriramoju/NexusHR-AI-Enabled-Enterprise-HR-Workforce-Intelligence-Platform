spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: employee-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/employees/**

        - id: payroll-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/payroll/**

        - id: google
          uri: https://google.com
          predicates:
            - Path=/google

server:
  port: 8080
