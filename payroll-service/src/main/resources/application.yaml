server:
  port: 8083

spring:
  application:
    name: payroll-service

  datasource:
    url: jdbc:postgresql://localhost:5432/nexushr_payroll
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false


logging:
  level:
    org.springframework.security: DEBUG