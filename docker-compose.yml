version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexushr-network

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - nexushr-network

  auth-service:
    image: varshith1001/auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - nexushr-network

  employee-service:
    image: varshith1001/employee-service:latest
    container_name: employee-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - nexushr-network

  payroll-service:
    image: varshith1001/payroll-service:latest
    container_name: payroll-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - nexushr-network

  ai-insights-service:
    image: varshith1001/ai-insights-service:latest
    container_name: ai-insights-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - nexushr-network

  notification-service:
    image: varshith1001/notification-service:latest
    container_name: notification-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - nexushr-network

  api-gateway:
    image: varshith1001/api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - employee-service
      - payroll-service
      - ai-insights-service
      - notification-service
    networks:
      - nexushr-network

  frontend:
    image: varshith1001/frontend:latest
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - nexushr-network

volumes:
  postgres_data:

networks:
  nexushr-network:
    driver: bridge